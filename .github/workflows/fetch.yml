name: Fetch Sports Odds Data

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Fetch mode"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - current-only
          - historical-only
      reset_checkpoint:
        description: "Reset checkpoint and refetch from scratch"
        required: false
        default: false
        type: boolean

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    permissions:
      contents: write
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install aiohttp aiofiles pandas numpy

      - name: Reset checkpoint
        if: ${{ github.event.inputs.reset_checkpoint == 'true' }}
        run: rm -f odds_data/checkpoint.json

      - name: Run fetch.py
        run: |
          MODE="${{ github.event.inputs.mode }}"
          MODE="${MODE:-both}"
          RESET_FLAG=""
          if [ "${{ github.event.inputs.reset_checkpoint }}" = "true" ]; then
            RESET_FLAG="--reset"
          fi
          case "$MODE" in
            current-only)    python odds.py --current-only    $RESET_FLAG ;;
            historical-only) python odds.py --historical-only $RESET_FLAG ;;
            *)               python odds.py                   $RESET_FLAG ;;
          esac

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add odds_data/
          if git diff --cached --quiet; then
            echo "No new data."
            exit 0
          fi
          TASKS=$(python -c "
          import json
          from pathlib import Path
          cp = Path('odds_data/checkpoint.json')
          print(len(json.loads(cp.read_text()).get('done', [])) if cp.exists() else 0)
          ")
          git commit -m "data: $(date -u '+%Y-%m-%d %H:%M UTC') | ${TASKS} tasks done"
          git push
